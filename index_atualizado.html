<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estacionamento Inteligente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Estacionamento - Prédio A</h1>
  </header>

  <main>
    <!-- Grid das vagas -->
    <section class="parking-lot" id="parking-lot"></section>

    <!-- Formulário de cadastro -->
    <section class="form-section">
      <h2>Registrar Entrada</h2>
      <form id="formEntrada">
        <label>Nome do Condutor:</label>
        <input type="text" id="condutor" required>
        <br>

        <label>RA:</label>
        <input type="text" id="ra" required>
        <br>

        <label>Modelo do Veículo:</label>
        <input type="text" id="veiculo" required>
        <br>

        <label>Placa:</label>
        <input type="text" id="placa" required>
        <br>

        <button type="submit">Ocupar Vaga</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
